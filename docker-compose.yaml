services:
  postgres:
    image: postgres:16-alpine
    container_name: springjpa-postgres
    environment:
      POSTGRES_DB: springjpa
      POSTGRES_USER: springuser
      POSTGRES_PASSWORD: springpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U springuser -d springjpa"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

