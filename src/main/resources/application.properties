spring.application.name=SpringJPA
spring.profiles.active=local

# Scheduler defaults (overridable per profile)
app.scheduler.enabled=true
# After each run completes, wait 1 minute (60000 ms) before running again.
app.scheduler.student-stats.fixed-delay-ms=60000
# Wait 1 minute (60000 ms) after app startup before running the first scheduler execution.
app.scheduler.student-stats.initial-delay-ms=60000
# Cron variant is disabled by default; set a cron expression to enable it.
app.scheduler.student-stats.cron=-
# Time zone used by cron scheduler when cron is enabled.
app.scheduler.student-stats.time-zone=UTC

